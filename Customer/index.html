<!-- /BranchAdmin/index.html (and others) -->
<div id="category-content"></div>

<script type="module">
    import * as Logic from './logic.js';

    window.addEventListener('loadSubModule', (e) => {
        const subModule = e.detail; // e.g., 'Dashboard'
        const container = document.getElementById('category-content');

        // Dynamically call the function in logic.js that matches the sub-module name
        if (typeof Logic[subModule] === 'function') {
            container.innerHTML = Logic[subModule]();
        } else {
            container.innerHTML = `<p>Module ${subModule} not found.</p>`;
        }
    });
</script>
