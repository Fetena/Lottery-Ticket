<!-- Category Container -->
<div id="category-content">Loading...</div>

<script type="module">
    window.addEventListener('moduleLoaded', async (e) => {
        const pathParts = e.detail.split('/'); // e.g., #/MainAdmin/Dashboard
        const subModule = pathParts[2]; // 'Dashboard'

        if (subModule) {
            try {
                // Dynamically import the specific logic.js for the sub-module
                const module = await import(`./${subModule}/logic.js`);
                if (typeof module.init === 'function') {
                    module.init();
                }
            } catch (err) {
                document.getElementById('category-content').innerHTML = 
                    `<p>Component ${subModule} not found.</p>`;
            }
        }
    });
</script>
